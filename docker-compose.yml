services:
  backend:
    build: ./backend
    environment:
      TRAINER_DATABASE_URL: sqlite:////app/data/trainer.db
    volumes:
      - trainer_data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  trainer_data:
