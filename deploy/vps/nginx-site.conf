# Внешний nginx на VPS (Debian/Ubuntu)
# 1. Замените trainer.example.com на ваш домен
# 2. sudo cp deploy/vps/nginx-site.conf /etc/nginx/sites-available/python-trainer
# 3. sudo ln -s /etc/nginx/sites-available/python-trainer /etc/nginx/sites-enabled/
# 4. sudo nginx -t && sudo systemctl reload nginx
# 5. sudo certbot --nginx -d trainer.example.com

upstream python_trainer {
    server 127.0.0.1:8080;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name trainer.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name trainer.example.com;

    # certbot заполнит после: certbot --nginx -d trainer.example.com
    ssl_certificate     /etc/letsencrypt/live/trainer.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trainer.example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 1m;

    location / {
        proxy_pass http://python_trainer;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
