# sudo certbot --nginx -d python-simulator.ai-smirnov.ru

upstream python_trainer {
    server 127.0.0.1:8090;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name python-simulator.ai-smirnov.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name python-simulator.ai-smirnov.ru;

    ssl_certificate     /etc/letsencrypt/live/python-simulator.ai-smirnov.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/python-simulator.ai-smirnov.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 1m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://python_trainer;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
